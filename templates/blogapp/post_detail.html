{% extends "layout.html" %}

{% block content  %}
<div class="content">

    <h2>{{post.post_header}}</h2>
    <br>
    <div class="post_text" style="background: url(media/{{post.image}});">
        <p>
            {{post.post_text}}
        </p>
        <img src="media/{{ post.image }}" alt="not found">
        <br>

        <span class="author">{{post.author}}</span>
    </div>  

</div>
{% endblock  %}
